<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataNode Entity Graph</title>
    <link rel="stylesheet" href="./styles.css?v=palantir-entity-8" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./">DataNode</a>
      <nav class="nav">
        <a id="feedNav" href="#feed">Feed</a>
        <a id="graphNav" class="active" href="#graph">Entity Graph</a>
      </nav>
    </header>

    <main class="shell">
      <aside class="panel left">
        <section class="block intro">
          <div class="eyebrow">Investigation</div>
          <h1>City Signal Graph</h1>
          <label class="search">
            <span>⌕</span>
            <input id="searchInput" value="Hamilton" aria-label="Search query" />
            <button id="searchButton" type="button">Run</button>
          </label>
        </section>

        <section class="block">
          <div class="section-title">City Index</div>
          <div class="grid-buttons" id="cityButtons"></div>
        </section>
      </aside>

      <section class="workspace" id="graph">
        <div class="statusbar">
          <div class="status-left">
            <span class="badge" id="queryBadge">Hamilton</span>
            <span class="badge cyan" id="nodeCount">0 nodes</span>
            <span class="badge cyan" id="edgeCount">0 links</span>
            <span class="badge green">mock data</span>
          </div>
          <div class="hint">ENTITY RESOLUTION ONLINE</div>
        </div>

        <div class="feed-view" id="feedView" hidden>
          <div class="feed-header">
            <div>
              <div class="section-title">Collected Feed</div>
              <h2 id="feedTitle">Hamilton Signals</h2>
            </div>
            <div class="feed-controls">
              <button class="feed-sort active" type="button" data-feed-sort="date">Date</button>
              <button class="feed-sort" type="button" data-feed-sort="score">Score</button>
            </div>
          </div>
          <div class="feed-list" id="feedList"></div>
        </div>

        <div class="graph-canvas" id="graphCanvas">
          <div class="canvas-title"><span></span>Entity Graph</div>
          <svg id="edgeLayer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div id="nodeLayer"></div>
        </div>
      </section>

      <aside class="panel right">
        <section class="block">
          <div class="selected-head">
            <div>
              <div class="section-title">Entity Inspector</div>
              <h2 id="selectedTitle">Root</h2>
            </div>
            <span class="badge" id="selectedKind">root</span>
          </div>
          <div id="selectedBody" class="selected-body"></div>
        </section>

        <section class="block">
          <div class="selected-head">
            <div class="section-title">Linked Evidence</div>
            <span class="badge cyan" id="relatedCount">0</span>
          </div>
          <div class="related-list" id="relatedPosts"></div>
        </section>

        <section class="block">
          <div class="section-title">Expansion Terms</div>
          <div class="seed-list" id="seedList"></div>
        </section>
      </aside>
    </main>

    <script src="./config.js?v=palantir-entity-8"></script>
    <script src="./app.js?v=palantir-entity-8"></script>
  </body>
</html>
