<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataNode Signal Graph</title>
    <link rel="stylesheet" href="./styles.css?v=city-mindmap-3" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./">DataNode Signal</a>
      <nav class="nav">
        <a href="#feed">피드</a>
        <a class="active" href="#graph">그래프</a>
      </nav>
    </header>

    <main class="shell">
      <aside class="panel left">
        <section class="block intro">
          <div class="eyebrow">Signal Graph</div>
          <h1>SNS 포스트 지식 그래프</h1>
          <p>도시별 소셜 포스트를 중심으로 해시태그, 작성자, 문맥 신호를 따라 확장합니다.</p>
          <label class="search">
            <span>⌕</span>
            <input id="searchInput" value="토론토" aria-label="검색어" />
            <button id="searchButton" type="button">Search</button>
          </label>
        </section>

        <section class="block">
          <div class="section-title">City Scope</div>
          <div class="grid-buttons" id="cityButtons"></div>
        </section>
      </aside>

      <section class="workspace" id="graph">
        <div class="statusbar">
          <div class="status-left">
            <span class="badge" id="queryBadge">토론토</span>
            <span class="badge cyan" id="nodeCount">0 nodes</span>
            <span class="badge cyan" id="edgeCount">0 links</span>
            <span class="badge green">mock data</span>
          </div>
          <div class="hint">node selection expands adjacent signals</div>
        </div>

        <div class="graph-canvas" id="graphCanvas">
          <div class="canvas-title"><span></span>Live entity graph</div>
          <svg id="edgeLayer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div id="nodeLayer"></div>
        </div>
      </section>

      <aside class="panel right">
        <section class="block">
          <div class="selected-head">
            <div>
              <div class="section-title">Selected entity</div>
              <h2 id="selectedTitle">Root</h2>
            </div>
            <span class="badge" id="selectedKind">root</span>
          </div>
          <div id="selectedBody" class="selected-body"></div>
        </section>

        <section class="block">
          <div class="selected-head">
            <div class="section-title">Related posts</div>
            <span class="badge cyan" id="relatedCount">0</span>
          </div>
          <div class="related-list" id="relatedPosts"></div>
        </section>

        <section class="block">
          <div class="section-title">Expansion seeds</div>
          <div class="seed-list" id="seedList"></div>
        </section>
      </aside>
    </main>

    <script src="./config.js?v=city-mindmap-3"></script>
    <script src="./app.js?v=city-mindmap-3"></script>
  </body>
</html>
